{% extends "core/base.html" %}

{% block content %}

<div class="container py-4">

<h2>Mis contactos</h2>

<a href="{% url 'contacto_create' %}" class="btn btn-primary mb-3">
Agregar contacto
</a>

<table class="table table-dark">

<thead>
<tr>
<th>Nombre</th>
<th>Cuenta</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for contacto in contactos %}

<tr>
<td>{{ contacto.nombre }}</td>
<td>{{ contacto.numero_cuenta }}</td>

<td>

<a href="{% url 'contacto_update' contacto.id %}" class="btn btn-warning btn-sm">
Editar
</a>

<a href="{% url 'contacto_delete' contacto.id %}" class="btn btn-danger btn-sm">
Eliminar
</a>

</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
